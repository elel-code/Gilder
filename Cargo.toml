[package]
name = "gilder"
version = "0.1.0"
edition = "2021"
license = "MPL-2.0"
repository = "https://example.invalid/gilder"
homepage = "https://example.invalid/gilder"
rust-version = "1.78"

[features]
default = []
gtk-renderer = []

[[bin]]
name = "gilderd"
path = "src/bin/gilderd.rs"

[[bin]]
name = "gilderctl"
path = "src/bin/gilderctl.rs"

[[bin]]
name = "gilder-convert"
path = "src/bin/gilder-convert.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

[lints.rust]
unsafe_code = "forbid"
