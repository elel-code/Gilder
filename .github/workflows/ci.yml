name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install renderer system dependencies
        run: scripts/install-ci-deps-ubuntu.sh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check

      - name: Check GTK renderer
        run: cargo check --features gtk-renderer

      - name: Check video renderer
        run: cargo check --features video-renderer

      - name: Check all renderers
        run: cargo check --features gtk-renderer,video-renderer

      - name: Test
        run: cargo test

      - name: Test GTK renderer
        run: cargo test --features gtk-renderer

      - name: Test video renderer
        run: cargo test --features video-renderer

      - name: Test all renderers
        run: cargo test --features gtk-renderer,video-renderer

      - name: Desktop policy smoke
        run: scripts/desktop-policy-smoke.sh --report-dir /tmp/gilder-desktop-policy-smoke

      - name: Upload desktop policy smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-policy-smoke
          path: /tmp/gilder-desktop-policy-smoke
          if-no-files-found: ignore

      - name: Video codec smoke
        run: scripts/video-codec-smoke.sh --install-missing --report-dir /tmp/gilder-video-codec-smoke

      - name: Upload video codec smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-codec-smoke
          path: /tmp/gilder-video-codec-smoke
          if-no-files-found: ignore
