name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install GTK renderer system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git libgtk-4-dev libwayland-bin libwayland-dev meson ninja-build pkg-config wayland-protocols
          git clone --depth 1 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          meson setup /tmp/gtk4-layer-shell/build /tmp/gtk4-layer-shell --prefix=/usr -Dexamples=false -Ddocs=false -Dintrospection=false -Dvapi=false
          sudo meson install -C /tmp/gtk4-layer-shell/build
          sudo ldconfig

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check

      - name: Check GTK renderer
        run: cargo check --features gtk-renderer

      - name: Test
        run: cargo test

      - name: Test GTK renderer
        run: cargo test --features gtk-renderer
